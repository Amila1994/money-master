name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Extract Project ZIP
      run: unzip money-master.zip

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: money-master

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: money-master

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: money-master/app/build/outputs/apk/debug/app-debug.apk
