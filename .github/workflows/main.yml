name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Unzip Project
      run: |
        if [ -f "money-master.zip" ]; then
          unzip money-master.zip -d .
        else
          echo "money-master.zip not found!"
          exit 1
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2

    - name: Ultimate Catalog and Dependency Fixer
      working-directory: money-master
      run: |
        # 1. සියලුම ප්ලගින් references සාමාන්‍ය ඒවා බවට හැරවීම සහ වැරදි ලයින් ඉවත් කිරීම
        find . -name "build.gradle.kts" -o -name "settings.gradle.kts" | xargs sed -i '/alias(libs.plugins/d' || true
        find . -name "build.gradle.kts" | xargs sed -i '/signingConfig/d' || true
        find . -name "build.gradle.kts" | xargs sed -i '/signingConfigs/d' || true
        
        # 2. බිල්ඩ් එක ක්‍රාෂ් කරන සියලුම 'libs.' dependencies වෙනුවට ස්ථාවර AndroidX dependencies ආදේශ කිරීම
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.core.ktx/"androidx.core:core-ktx:1.12.0"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.lifecycle.runtime.ktx/"androidx.lifecycle:lifecycle-runtime-ktx:2.6.2"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.activity.compose/"androidx.activity:activity-compose:1.8.2"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.ui/"androidx.compose.ui:ui:1.5.4"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.ui.graphics/"androidx.compose.ui:ui-graphics:1.5.4"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.ui.tooling.preview/"androidx.compose.ui:ui-tooling-preview:1.5.4"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.material3/"androidx.compose.material3:material3:1.1.2"/g' || true
        
        # 3. ටෙස්ට් ලයින් වල තියෙන සියලුම 'libs.' කොටස්ද ස්ථාවර වර්ෂන් වලට හැරවීම
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.junit/"androidx.test.ext:junit:1.1.5"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.espresso.core/"androidx.test.espresso:espresso-core:3.5.1"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.ui.test.junit4/"androidx.compose.ui:ui-test-junit4:1.5.4"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.ui.tooling/"androidx.compose.ui:ui-tooling:1.5.4"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/libs.androidx.ui.test.manifest/"androidx.compose.ui:ui-test-manifest:1.5.4"/g' || true
        
        # 4. ඉතිරි විය හැකි ඕනෑම 'libs.' references අඩංගු ලයින් සම්පූර්ණයෙන්ම මකා දැමීම (බිල්ඩ් එක ආරක්ෂා කිරීමට)
        find . -name "build.gradle.kts" | xargs sed -i '/libs\./d' || true

    - name: Build with Gradle
      working-directory: money-master
      run: gradle assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Dorg.jetbrains.kotlin.compiler.runner.kotlin.daemon.ext.impl.backend.fksp=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
