name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Unzip Project
      run: |
        if [ -f "money-master.zip" ]; then
          unzip money-master.zip -d .
        else
          echo "money-master.zip not found!"
          exit 1
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2

    - name: Clean Build Config and Plugins
      working-directory: money-master
      run: |
        # settings.gradle.kts අලුතින්ම නිවැරදිව ලිවීම
        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "money-master"
        include(":app")
        EOF

        # build.gradle.kts වල තියෙන කරදරකාරී libs references සහ ප්ලගින් බ්ලොක්ස් ඉවත් කර සරල කිරීම
        cat << 'EOF' > app/build.gradle.kts
        plugins {
            id("com.android.application") version "8.2.0"
            id("org.jetbrains.kotlin.android") version "1.9.0"
        }

        android {
            compileSdk = 34
            namespace = "com.money.master"

            defaultConfig {
                applicationId = "com.money.master"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
                testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
            }

            buildTypes {
                release {
                    isMinifyEnabled = false
                    proguardFiles(getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro")
                }
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = "17"
            }
        }

        dependencies {
            implementation("com.android.billingclient:billing-ktx:6.1.0")
            implementation("com.google.android.gms:play-services-auth:21.0.1")
            implementation("com.google.android.gms:play-services-location:21.2.0")
            implementation("com.google.android.gms:play-services-ads:23.0.0")
            
            // මූලික AndroidX dependencies
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.2")
            implementation("androidx.activity:activity-compose:1.8.2")
        }
        EOF

    - name: Build with Gradle
      working-directory: money-master
      run: gradle assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Dorg.jetbrains.kotlin.compiler.runner.kotlin.daemon.ext.impl.backend.fksp=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
