name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Unzip Project
      run: |
        if [ -f "money-master.zip" ]; then
          unzip money-master.zip -d .
        else
          echo "money-master.zip not found!"
          exit 1
        fi

    - name: Generate Missing Gradle Wrapper
      run: gradle wrapper

    - name: Force Generate Debug Keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -keypass android -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        cp ~/.android/debug.keystore money-master/
        cp ~/.android/debug.keystore money-master/app/

    - name: Change output file permissions
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug -Dorg.gradle.jvmargs="-Dorg.jetbrains.kotlin.compiler.runner.kotlin.daemon.ext.impl.backend.fksp=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
