name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Unzip Project
      run: |
        if [ -f "money-master.zip" ]; then
          unzip money-master.zip -d .
        else
          echo "money-master.zip not found!"
          exit 1
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2

    - name: Master Rewrite for Gradle Configurations
      run: |
        # 1. settings.gradle.kts එක සම්පූර්ණයෙන්ම පිරිසිදුව ලිවීම
        cat << 'EOF' > money-master/settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "money-master"
        include(":app")
        EOF

        # 2. app/build.gradle.kts එක කිසිම Syntax වැරැද්දක් නැතිව අලුතින්ම ලිවීම
        cat << 'EOF' > money-master/app/build.gradle.kts
        plugins {
            id("com.android.application") version "8.2.0"
            id("org.jetbrains.kotlin.android") version "1.9.0"
        }

        android {
            compileSdk = 34
            namespace = "com.money.master"

            defaultConfig {
                applicationId = "com.money.master"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
                testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
            }

            buildTypes {
                release {
                    isMinifyEnabled = false
                }
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }
            kotlinOptions {
                jvmTarget = "17"
            }
        }

        dependencies {
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.6.2")
            implementation("androidx.activity:activity-compose:1.8.2")
            implementation("androidx.compose.ui:ui:1.5.4")
            implementation("androidx.compose.ui:ui-graphics:1.5.4")
            implementation("androidx.compose.ui:ui-tooling-preview:1.5.4")
            implementation("androidx.compose.material3:material3:1.1.2")
            
            // ඔයාට අවශ්‍ය වුණු Google SDK සහ Ads
            implementation("com.android.billingclient:billing-ktx:6.1.0")
            implementation("com.google.android.gms:play-services-auth:21.0.1")
            implementation("com.google.android.gms:play-services-location:21.2.0")
            implementation("com.google.android.gms:play-services-ads:23.0.0")

            // Test Dependencies (Syntax දෝෂ වලින් තොරව)
            testImplementation("junit:junit:4.13.2")
            androidTestImplementation("androidx.test.ext:junit:1.1.5")
            androidTestImplementation("androidx.test.espresso:espresso-core:3.5.1")
            androidTestImplementation("androidx.compose.ui:ui-test-junit4:1.5.4")
            debugImplementation("androidx.compose.ui:ui-tooling:1.5.4")
            debugImplementation("androidx.compose.ui:ui-test-manifest:1.5.4")
        }
        EOF

    - name: Build with Gradle
      working-directory: money-master
      run: gradle assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Dorg.jetbrains.kotlin.compiler.runner.kotlin.daemon.ext.impl.backend.fksp=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
