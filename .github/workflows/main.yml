name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Extract Project ZIP
      run: unzip money-master.zip

    - name: Generate Debug Keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        cp ~/.android/debug.keystore money-master/

    - name: Download Missing Gradle Jar and Set Properties
      run: |
        mkdir -p money-master/gradle/wrapper
        wget -O money-master/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v9.3.1/gradle/wrapper/gradle-wrapper.jar
        echo "distributionBase=GRADLE_USER_HOME" > money-master/gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" >> money-master/gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\://services.gradle.org/distributions/gradle-9.3.1-bin.zip" >> money-master/gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" >> money-master/gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" >> money-master/gradle/wrapper/gradle-wrapper.properties

    - name: Grant execute permission for gradlew
      run: chmod +x money-master/gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: money-master

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: money-master/app/build/outputs/apk/debug/app-debug.apk
