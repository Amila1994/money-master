name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Unzip Project
      run: |
        if [ -f "money-master.zip" ]; then
          unzip money-master.zip -d .
        else
          echo "money-master.zip not found!"
          exit 1
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2

    - name: Force Patch build.gradle.kts with Raw Code
      run: |
        cat << 'EOF' > money-master/app/build.gradle.kts
        plugins {
            alias(libs.plugins.android.application) apply false
            alias(libs.plugins.kotlin.compose) apply false
            alias(libs.plugins.google.devtools.ksp) apply false
            alias(libs.plugins.roborazzi) apply false
            alias(libs.plugins.secrets) apply false
        }
        android {
            compileSdk = 34
            defaultConfig {
                applicationId = "com.money.master"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0"
            }
            buildTypes {
                release {
                    isMinifyEnabled = false
                }
            }
        }
        dependencies {
            implementation("com.android.billingclient:billing-ktx:6.1.0")
            implementation("com.google.android.gms:play-services-auth:21.0.1")
            implementation("com.google.android.gms:play-services-location:21.2.0")
            implementation("com.google.android.gms:play-services-ads:23.0.0")
        }
        EOF

    - name: Remove Malformed Plugins Blocks
      working-directory: money-master
      run: |
        find . -name "build.gradle.kts" -o -name "settings.gradle.kts" | xargs sed -i '/alias(libs.plugins/d' || true
        find . -name "build.gradle.kts" | xargs sed -i '/signingConfig/d' || true

    - name: Build with Gradle
      working-directory: money-master
      run: gradle assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Dorg.jetbrains.kotlin.compiler.runner.kotlin.daemon.ext.impl.backend.fksp=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
