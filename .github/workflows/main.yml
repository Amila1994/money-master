name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Unzip Project
      run: |
        if [ -f "money-master.zip" ]; then
          unzip money-master.zip -d .
        else
          echo "money-master.zip not found!"
          exit 1
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2

    - name: Dynamic Code Patch for Repositories and Catalog
      working-directory: money-master
      run: |
        # settings.gradle.kts එකට අවශ්‍ය Repositories බලෙන් ඇතුළත් කිරීම
        cat << 'EOF' > settings.gradle.kts
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "money-master"
        include(":app")
        EOF

        # build.gradle.kts වල තියෙන දෝෂ සහිත libs ප්ලගින්ස් සාමාන්‍ය string ප්ලගින්ස් වලට හැරවීම (වර්ෂන් ද සහිතව)
        find . -name "build.gradle.kts" | xargs sed -i 's/alias(libs.plugins.android.application)/id("com.android.application") version "8.2.0"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/alias(libs.plugins.kotlin.compose)/id("org.jetbrains.kotlin.plugin.compose") version "1.9.0"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/alias(libs.plugins.google.devtools.ksp)/id("com.google.devtools.ksp") version "1.9.0-1.0.13"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/alias(libs.plugins.roborazzi)/id("io.github.takahirom.roborazzi") version "1.7.0"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/alias(libs.plugins.secrets)/id("com.google.android.libraries.mapsplatform.secrets-gradle-plugin") version "2.0.1"/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/alias(libs.plugins.kotlin.android)/id("org.jetbrains.kotlin.android") version "1.9.0"/g' || true
        
        # Keystore බයිපාස් කිරීම
        find . -name "build.gradle.kts" | xargs sed -i 's/signingConfig.*=.*signingConfigs.debug/signingConfig = null/g' || true
        find . -name "build.gradle.kts" | xargs sed -i 's/signingConfigs.debug/signingConfig = null/g' || true

    - name: Build with Gradle
      working-directory: money-master
      run: gradle assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Dorg.jetbrains.kotlin.compiler.runner.kotlin.daemon.ext.impl.backend.fksp=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
