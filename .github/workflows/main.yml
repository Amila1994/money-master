name: Android CI

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Unzip Project
      run: |
        if [ -f "money-master.zip" ]; then
          unzip money-master.zip -d .
        else
          echo "money-master.zip not found!"
          exit 1
        fi

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.2

    - name: Clean and Fix Version Catalog Errors
      working-directory: money-master
      run: |
        # ප්‍රොජෙක්ට් එකේ තියෙන සියලුම build.gradle.kts වල තියෙන alias(libs...) කොටස් සහ signingConfig සම්පූර්ණයෙන්ම ඉවත් කිරීම
        find . -name "build.gradle.kts" -o -name "settings.gradle.kts" | xargs sed -i '/alias(libs.plugins/d' || true
        find . -name "build.gradle.kts" | xargs sed -i '/signingConfig/d' || true
        find . -name "build.gradle.kts" | xargs sed -i '/signingConfigs/d' || true

    - name: Build with Gradle
      working-directory: money-master
      run: gradle assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Dorg.jetbrains.kotlin.compiler.runner.kotlin.daemon.ext.impl.backend.fksp=true"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: "**/build/outputs/apk/debug/*.apk"
